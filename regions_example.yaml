# 区域配置示例文件
# 使用归一化坐标 (0.0 ~ 1.0)，方便不同分辨率视频复用

regions:
  # 检测区域：需要监控高空抛物的区域
  detect_regions:
    # 区域1：左侧建筑外墙（假设建筑物左侧有窗户区域）
    - id: "building_left_window"
      name: "左侧建筑窗户区域"
      points:
        - {x: 0.05, y: 0.1}   # 左上角
        - {x: 0.25, y: 0.1}   # 右上角
        - {x: 0.25, y: 0.9}   # 右下角
        - {x: 0.05, y: 0.9}   # 左下角
      color: [0, 255, 0]        # 绿色边框
      description: "检测从左侧窗户抛出的物体"

    # 区域2：右侧建筑外墙
    - id: "building_right_window"
      name: "右侧建筑窗户区域"
      points:
        - {x: 0.75, y: 0.1}   # 左上角
        - {x: 0.95, y: 0.1}   # 右上角
        - {x: 0.95, y: 0.9}   # 右下角
        - {x: 0.75, y: 0.9}   # 左下角
      color: [0, 255, 0]        # 绿色边框
      description: "检测从右侧窗户抛出的物体"

  # 屏蔽区域：不需要检测的区域（如树木、移动物体等）
  shield_regions:
    # 屏蔽区域1：左侧树木（可能产生误检）
    - id: "tree_left"
      name: "左侧树木区域"
      points:
        - {x: 0.30, y: 0.4}
        - {x: 0.40, y: 0.4}
        - {x: 0.40, y: 0.6}
        - {x: 0.30, y: 0.6}
      color: [0, 0, 255]        # 红色边框
      description: "屏蔽左侧树木区域，避免风吹树叶产生误检"

# 使用说明：
# 1. 归一化坐标说明：
#    - x: 0.0 = 图像最左，x: 1.0 = 图像最右
#    - y: 0.0 = 图像最上，y: 1.0 = 图像最下
# 2. 坐标会自动根据视频分辨率缩放到实际像素坐标
# 3. 检测区域 (detect_regions)：绿色边框，只检测该区域内的物体
# 4. 屏蔽区域 (shield_regions)：红色边框，该区域内的物体会被忽略
# 5. 可以根据实际场景添加更多区域
