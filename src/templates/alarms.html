<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高空抛物检测系统 - 告警列表</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🏠 高空抛物检测系统</div>
        <div class="nav-links">
            <a href="/" class="nav-link">首页</a>
            <a href="/alarms" class="nav-link active">📢 告警列表</a>
            <a href="/config" class="nav-link">⚙️ 配置</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>🚨 告警列表</h2>
                <div class="header-actions">
                    <input type="text" id="search-input" placeholder="🔍 搜索告警..." class="search-input">
                    <button class="btn btn-sm" id="btn-refresh">🔄 刷新</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table" id="alarms-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>时间</th>
                            <th>轨迹ID</th>
                            <th>置信度</th>
                            <th>快照</th>
                            <th>视频</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="alarms-tbody">
                        <tr>
                            <td colspan="7" class="text-center text-muted">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- 告警详情模态框 -->
    <div class="modal" id="alarm-modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>🚨 告警详情</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 动态加载内容 -->
            </div>
        </div>
    </div>

    <script src="/static/alarms.js"></script>
</body>
</html>
